name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend and sandbox contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e "./apps/api[dev,postgres]"
      - name: Compile backend modules
        run: python -m compileall -q apps/api/app
      - name: Verify fresh SQLite migrations
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci-migration.db
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head
          alembic check
      - name: Build fixed sandbox image
        run: docker build --tag codereason-sandbox:py312 docker/sandbox
      - name: Run backend tests
        run: python -m pytest apps/api/tests

  frontend:
    name: Frontend unit, build, and browser flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Gate high and critical npm advisories
        working-directory: apps/web
        run: npm audit --audit-level=high
      - name: Run unit tests
        working-directory: apps/web
        run: npm run test:run
      - name: Build production frontend
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run browser demo flow
        working-directory: apps/web
        run: npm run e2e

  compose:
    name: PostgreSQL Compose clean start
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build fixed sandbox image
        run: docker compose build sandbox
      - name: Start PostgreSQL stack
        run: docker compose up --detach --build postgres api worker web
      - name: Wait for API
        run: curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://127.0.0.1:8000/api/health
      - name: Wait for web
        run: curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://127.0.0.1:3000/
      - name: Verify PostgreSQL migration round trip
        run: |
          docker compose exec -T api alembic check
          docker compose stop api worker web
          docker compose run --rm --no-deps migrate alembic downgrade base
          docker compose run --rm --no-deps migrate alembic upgrade head
          docker compose run --rm --no-deps migrate alembic check
          docker compose start api worker web
          curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://127.0.0.1:8000/api/health
          curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://127.0.0.1:3000/
      - name: Show service state on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Tear down clean-start stack
        if: always()
        run: docker compose down --volumes
