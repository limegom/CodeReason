name: codereason

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codereason}
      POSTGRES_USER: ${POSTGRES_USER:-codereason}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codereason-local-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - application

  api:
    build:
      context: ./apps/api
      target: api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-CodeReason API}
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-codereason}:${POSTGRES_PASSWORD:-codereason-local-only}@postgres:5432/${POSTGRES_DB:-codereason}
      DEMO_MODE: ${DEMO_MODE:-true}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-codereason-local-internal-change-me}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - application

  worker:
    build:
      context: ./apps/api
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-codereason}:${POSTGRES_PASSWORD:-codereason-local-only}@postgres:5432/${POSTGRES_DB:-codereason}
      DEMO_MODE: ${DEMO_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
    depends_on:
      migrate:
        condition: service_completed_successfully
    # The trusted worker needs Docker Engine control for the local demo. The
    # API and web services intentionally do not receive this host-privileged
    # socket. Student containers never receive it either.
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - application

  migrate:
    build:
      context: ./apps/api
      target: api
    restart: "no"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-codereason}:${POSTGRES_PASSWORD:-codereason-local-only}@postgres:5432/${POSTGRES_DB:-codereason}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - application

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000/api}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - application

  # This build-only profile gives the execution worker its fixed, reviewed
  # image. `docker compose build sandbox` builds it without starting a service.
  sandbox:
    profiles: ["sandbox-image"]
    image: codereason-sandbox:py312
    build:
      context: ./docker/sandbox
    entrypoint: ["/bin/true"]
    network_mode: none

volumes:
  postgres-data:

networks:
  application:
    driver: bridge
